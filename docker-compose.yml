services:
  # 1. SQL Server (Publisher)
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_container
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_PW}
      - MSSQL_AGENT_ENABLED=True
    ports:
      - "1433:1433"
    restart: always
    volumes:
      - replica-data:/var/opt/mssql/replica
    networks:
      - lab-net

  # 1b. SQL Server (Subscriber)
  mssql-secondary:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_secondary
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_PW}
      - MSSQL_AGENT_ENABLED=True
    ports:
      - "1434:1433"
    restart: always
    volumes:
      - replica-data:/var/opt/mssql/replica
    networks:
      - lab-net

  # 2. PostgreSQL
  postgres:
    image: postgres:latest
    container_name: postgres_container
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PW}
    ports:
      - "5433:5432"
    restart: always
    networks:
      - lab-net

  # 3. Oracle
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle_container
    environment:
      - ORACLE_PASSWORD=${ORACLE_PW}
    ports:
      - "1521:1521"
    restart: always
    networks:
      - lab-net

  # 4. MongoDB
  mongo:
    image: mongo:latest
    container_name: mongo_container
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PW}
    ports:
      - "27017:27017"
    restart: always
    networks:
      - lab-net

  # 5. Spark (Delta Lake Engine)
  spark:
    image: apache/spark:3.5.1
    container_name: spark_delta_engine
    user: root
    # We use the full path to the entrypoint script which handles setup automatically
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      - SPARK_NO_DAEMONIZE=true
      # Add these two lines to tell the engine where to find Delta
      - SPARK_JARS_PACKAGES=io.delta:delta-spark_2.12:3.1.0
      - SPARK_CONF_spark_sql_extensions=io.delta.sql.DeltaSparkSessionExtension
      - SPARK_CONF_spark_sql_catalog_spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
    volumes:
      - ./delta_warehouse:/opt/spark/work-dir
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - lab-net

  # 5b. Spark Worker (Executes the actual compute)
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark_worker
    user: root
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker"]
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: spark://spark:7077
    volumes:
      - ./delta_warehouse:/opt/spark/work-dir
    networks:
      - lab-net

  # 6. MinIO (S3-Compatible Object Storage)
  minio:
    image: minio/minio:latest
    container_name: minio_container
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PW}
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - lab-net

  # Infrastructure Definitions
networks:
  lab-net:
    driver: bridge

volumes:
  replica-data:
  minio-data:
